@if(member(); as member){
<div routerLink="/members/{{member.id}}" class="card cursor-pointer transition-all duration-300 ease-in-out 
            transform hover:-translate-y-2 relative">
    <div class="card bg-base-100 w-96 shadow-sm">
        <figure>
            <img [src]="member.imageUrl" [alt]="member.firstName" />
        </figure>
        <div class="card-body">
            <h2 class="card-title">
                {{member.firstName + ' ' + member.lastName}}
                <div class="badge badge-secondary">{{member.role}}</div>
            </h2>
            <p>{{member.description}}</p>
        </div>
    </div>
</div>


}
